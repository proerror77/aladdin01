---
# 提示词改写模式 - 视频生成被拒后的 LLM 改写指导
# 用于 gen-worker 在 5 次重试失败后触发的改写阶段

version: "2.0"

# 改写原则
principles:
  - "最小改写：只修改导致拒绝的部分，保留镜头意图和叙事功能"
  - "保留主体：角色外貌、服装、场景不变"
  - "保留镜头：镜头类型、运镜方式不变"
  - "降级表达：将直接描述改为间接/暗示表达"

# 暴力场景改写模式
violence_rewrites:
  - pattern: "角色A攻击角色B"
    rewrite: "角色A做出攻击动作，镜头切到角色B的反应表情"
  - pattern: "血腥/流血"
    rewrite: "删除血腥描述，保留受伤后的情绪状态"
  - pattern: "武器近景"
    rewrite: "改为武器持握的手部特写，不展示伤害过程"
  - pattern: "死亡场景"
    rewrite: "改为角色倒下的背影或旁观者的震惊表情"

# 性暗示场景改写模式
sexual_rewrites:
  - pattern: "亲密接触"
    rewrite: "改为眼神交流或手部接触的情感特写"
  - pattern: "暴露服装"
    rewrite: "改为保守服装描述，保留角色气质"

# 冲突场景改写模式
conflict_rewrites:
  - pattern: "激烈争吵+辱骂"
    rewrite: "改为激烈争吵，角色表情愤怒，无具体辱骂词汇"
  - pattern: "威胁性语言"
    rewrite: "改为强硬语气的对话，删除威胁内容"

# 改写提示词模板（发给 LLM 的 system prompt）
llm_rewrite_prompt: |
  你是一个视频提示词优化专家。以下提示词被视频生成平台拒绝了。

  你的任务：
  1. 分析可能导致拒绝的内容
  2. 对提示词做最小改写，只修改问题部分
  3. 保留：镜头意图、角色外貌、场景设定、运镜方式
  4. 降级：暴力→反应镜头，性→情绪氛围，辱骂→中性冲突
  5. 输出改写后的完整提示词，不超过 2000 字符

  原始提示词：
  {original_prompt}

  拒绝原因（如有）：
  {rejection_reason}

  请直接输出改写后的提示词，不要解释。

# ──────────────────────────────────────────────
# v2.0 新增：差异化改写策略（gen-worker 根据 failure_type 选择）
# ──────────────────────────────────────────────

strategies:

  # 内容拒绝：保守改写，移除敏感描述
  conservative:
    temperature: 0.3
    instruction: |
      视频生成平台因内容政策拒绝了这个提示词。
      请做最保守的改写：
      1. 识别可能触发内容过滤的词汇或描述
      2. 用中性、间接的表达替换（暴力→反应镜头，血腥→情绪特写）
      3. 保留所有镜头语言、角色描述、场景设定
      4. 不改变叙事意图，只改变表达方式
      5. 输出改写后的完整提示词，不超过 2000 字符

  # 运镜过复杂：简化运镜，减少时间戳分段
  simplify_motion:
    temperature: 0.5
    instruction: |
      视频生成模型无法执行这个提示词中的复杂运镜。
      请简化运镜描述：
      1. 合并相邻时间戳（如 0-3秒+4-7秒 合并为 0-7秒）
      2. 简化运镜词汇：环绕镜头→跟镜头，希区柯克变焦→推镜头，升降镜头→固定镜头
      3. 减少时间戳分段数量（最多保留 3 个分段）
      4. 保留核心动作和对白，删除次要的光影/特效描述
      5. 输出改写后的完整提示词，不超过 2000 字符

  # 超时/过长：截断，保留核心
  truncate:
    temperature: 0.3
    instruction: |
      提示词过长或请求超时。
      请截断提示词，只保留最核心的内容：
      1. 删除所有音效描述（音效行整行删除）
      2. 删除次要角色的详细描述（只保留主角）
      3. 合并时间戳，减少分段数量
      4. 删除重复的风格描述
      5. 目标长度：800 字符以内
      6. 输出改写后的完整提示词

  # 参考图问题：降级为纯文生视频
  drop_references:
    temperature: 0.5
    instruction: |
      参考图导致生成失败（格式/尺寸/内容问题）。
      请将提示词改写为纯文生视频模式：
      1. 删除所有 @图片N 引用（包括角色参考、场景参考、分镜图参考）
      2. 将角色外貌描述补充到提示词正文中（从 @图片N 作为<角色名> 改为直接描述外貌）
      3. 将场景描述补充到提示词正文中
      4. 保留所有时间戳分段和运镜描述
      5. 输出改写后的完整提示词，不超过 2000 字符

  # 未知原因：通用最小改写（原有逻辑）
  minimal:
    temperature: 0.7
    instruction: |
      视频生成失败，原因不明。
      请对提示词做最小改写：
      1. 分析可能导致失败的内容
      2. 做最小必要的修改
      3. 保留所有镜头语言、角色描述、场景设定
      4. 输出改写后的完整提示词，不超过 2000 字符

# 改写轮次限制（以 config/platforms/seedance-v2.yaml 中的 max_rewrite_rounds 为准）
escalation_on_failure: "标记为 failed，记录到 generation-report.md，通知 team-lead"
