# Prompt Enhancement Rules
# 基于实战经验的 AI 图像生成提示词增强规则

version: "1.0"
description: "提示词增强规则，用于提升 AI 图像的真实感和电影质感"

# 模型选择策略
model_selection:
  style_definition:
    recommended: "MJ"  # Midjourney
    documentary: "🍌Pro"  # Nanobanana Pro
    eastern_culture: "Seedream 4.0+"
    note: "东方文化类需增加光影描述词，丰富写实细节，可从灵感专区找参考"

  character_consistency:
    recommended: "🍌Pro"
    eastern_face: "Seedream 4.5/4.6"
    note: "注意图片的视角、景别一致"

  storyboard_multi_angle:
    first_choice: "🍌2"
    fallback: "🍌Pro"
    note: "先用🍌2，不达预期再选用🍌Pro模型"

# 构图法则
composition_rules:
  foreground_occlusion:
    description: "前景遮挡，增加层次感和代入感"
    example: "前景右下角酒壶遮挡，对焦模糊"
    keywords:
      - "前景遮挡"
      - "对焦模糊"
      - "层次丰富"

  leading_lines:
    description: "引导线构图，将视线引向关键区域"
    example: "两侧岩壁与龙形建筑的边缘，将视线引向峡谷深渊"
    keywords:
      - "引导线"
      - "视线引导"
      - "深邃感"

  framing:
    description: "框架构图，利用门框、窗框等形成天然框架"
    example: "茶馆木质门框与横梁形成天然框架，门内可见模糊茶客身影"
    keywords:
      - "框架构图"
      - "门框"
      - "窗框"
      - "框架内明暗对比"

  symmetry_center:
    description: "对称/中心构图，体现威严和庄重"
    example: "以大殿中轴线为基准，两边站着大臣"
    keywords:
      - "对称构图"
      - "中轴线"
      - "威严感"

# 减少 AI 味的关键词
anti_ai_keywords:
  realism:
    - "照片级写实"
    - "真人实拍质感"
    - "胶片颗粒"
    - "细微噪点"
    - "真实皮肤肌理"
    - "自然毛孔"
    - "肤质粗糙"
    - "人物的比例符合正常比例"

  camera_photography:
    - "35毫米胶片拍摄"
    - "浅景深"
    - "对焦模糊"
    - "背景虚化"
    - "手持摄影"
    - "轻微运动模糊"
    - "低角度仰拍"
    - "鸟瞰俯拍"

  lighting_atmosphere:
    - "伦勃朗光"
    - "强烈明暗对比"
    - "低饱和色调"
    - "镜头畸变"
    - "色差"
    - "高反差"
    - "暗调氛围"
    - "高饱和低明度色调"
    - "高曝微过曝"
    - "胶片颗粒感与肌理质感"

# 提示词模板增强
prompt_templates:
  character_pack:
    base: |
      角色设计图，{character_name}，{appearance}，
      {angle}视图，白色背景，角色设计稿风格，全身像，
      高清细节，无水印，无文字，纯净背景

    enhanced: |
      角色设计图，{character_name}，{appearance}，
      {angle}视图，白色背景，角色设计稿风格，全身像，
      照片级写实，真人实拍质感，胶片颗粒，细微噪点，
      真实皮肤肌理，自然毛孔，人物的比例符合正常比例，
      35毫米胶片拍摄，浅景深，背景虚化，
      高清细节，无水印，无文字，纯净背景

  scene_styleframe:
    base: |
      场景设计图，{scene_name}，{scene_description}，
      {time_of_day}，{lighting}，电影级场景概念图，
      高清细节，无人物，无水印

    enhanced: |
      场景设计图，{scene_name}，{scene_description}，
      {time_of_day}，{lighting}，电影级场景概念图，
      照片级写实，真人实拍质感，35毫米胶片拍摄，
      伦勃朗光，强烈明暗对比，低饱和色调，
      胶片颗粒感与肌理质感，镜头畸变，色差，
      高清细节，无人物，无水印

  storyboard_shot:
    base: |
      {shot_description}，{camera_angle}，{lighting}

    enhanced: |
      {shot_description}，{camera_angle}，{lighting}，
      照片级写实，真人实拍质感，35毫米胶片拍摄，
      {composition_rule}，浅景深，对焦模糊，背景虚化，
      伦勃朗光，强烈明暗对比，低饱和色调，
      胶片颗粒，细微噪点，镜头畸变，色差，
      电影剧照质感，层次丰富，情绪张力拉满

# 东方文化特殊增强
eastern_culture_enhancement:
  lighting_keywords:
    - "暖黄侧逆光"
    - "橙金与暗紫渐变天空"
    - "尘土漫射光线"
    - "烛光摇曳"
    - "月光如水"
    - "晨雾弥漫"

  atmosphere_keywords:
    - "古韵氛围"
    - "东方美学"
    - "水墨意境"
    - "禅意空间"
    - "江湖气息"

  detail_keywords:
    - "木质纹理"
    - "青石板路"
    - "飞檐斗拱"
    - "雕花窗棂"
    - "丝绸质感"

# 应用策略
application_strategy:
  character_pack:
    use_enhanced: true
    priority_keywords:
      - "照片级写实"
      - "真人实拍质感"
      - "真实皮肤肌理"
      - "人物的比例符合正常比例"

  scene_styleframe:
    use_enhanced: true
    priority_keywords:
      - "照片级写实"
      - "35毫米胶片拍摄"
      - "伦勃朗光"
      - "强烈明暗对比"

  storyboard:
    use_enhanced: true
    add_composition: true
    priority_keywords:
      - "照片级写实"
      - "浅景深"
      - "电影剧照质感"
      - "层次丰富"

# 质量控制
quality_control:
  avoid_keywords:
    - "完美"
    - "梦幻"
    - "唯美"
    - "仙气"
    - "超现实"

  prefer_keywords:
    - "真实"
    - "自然"
    - "写实"
    - "粗糙"
    - "质感"
