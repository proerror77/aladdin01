---
# API 端点配置
# 所有 API key 通过环境变量注入，不硬编码

seedance:
  # 火山引擎火山方舟官方 API
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  api_key: "${ARK_API_KEY}"
  endpoints:
    create_task: "/contents/generations/tasks"
    task_status: "/contents/generations/tasks/{task_id}"
  # 视频直接从响应的 content.video_url 下载，无需单独下载端点
  timeout_seconds: 300
  poll_interval_seconds: 10
  # 可用模型 ID（与 config/platforms/seedance-v2.yaml 保持一致）
  models:
    seedance_2_0: "doubao-seedance-2.0"           # 旗舰版，API 尚未开放
    seedance_1_5_pro: "doubao-seedance-1-5-pro-251215"  # 当前推荐
    seedance_1_0_pro: "doubao-seedance-1-0-pro-250528"
    seedance_1_0_pro_fast: "doubao-seedance-1-0-pro-fast-251015"
    seedance_1_0_lite_t2v: "doubao-seedance-1-0-lite-t2v-250428"
    seedance_1_0_lite_i2v: "doubao-seedance-1-0-lite-i2v-250428"

image_gen:
  base_url: "${IMAGE_GEN_API_URL}"
  api_key: "${IMAGE_GEN_API_KEY}"
  endpoints:
    generate: "/v1/images/generations"
  timeout_seconds: 60

moderation:
  base_url: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  endpoints:
    check: "/moderations"

tts:
  # TTS 平台预留接口，当前阶段不启用
  enabled: false
  platform: "pending"
  base_url: "${TTS_API_URL}"
  api_key: "${TTS_API_KEY}"
