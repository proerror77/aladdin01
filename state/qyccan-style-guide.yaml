project: qyccan
剧本: 《开局青玉蚕：吞噬进化吊打诸天》
locked_at: 2026-03-31

# 剧本类型
genre:
  primary: 玄幻
  sub_genre: 系统进化、沙雕、异兽流
  tone: 爽剧、反派主角、打脸装逼

# 视觉风格定义
visual_style:
  art_style: 半写实
  quality: 电影级短剧质感
  color_tone: 高饱和度、冷暖对比
  lighting: 电影级光影、戏剧化打光
  reference: "玄幻短剧风格，类似《赘婿》《庆余年》短剧质感"

# 角色风格规则
character_style:
  protagonist:
    vibe: 霸气、痞气、反派气质、腹黑
    note: 即使是动物形态（蚕/蛇/蟒）也要有气场和反派气质，不能可爱化
  female_lead:
    vibe: 高冷御姐、倔强、坚韧
    style: 古装武侠、红衣似火、写实人物比例
  supporting:
    style: 写实人物比例、符合玄幻世界观
  minor:
    style: 写实人物比例、龙套质感

# 统一提示词模板
prompt_template: |
  {角色描述}，{气质特征}，{动作/表情}，
  玄幻短剧风格，半写实画风，电影级质感，
  高饱和度色彩，冷暖对比光影，戏剧化打光，
  专业角色概念设计，角色设计稿，
  三视图（正面/侧面/背面）水平排列，白色背景，
  三个视图必须是同一个角色，保持完全一致

# 禁止项
forbidden:
  - Q版风格
  - 可爱化（除非角色设定就是可爱）
  - 卡通风格
  - 儿童向画风
  - 不同角色间风格不统一
  - 视图融合或重叠

# 角色特殊说明
character_notes:
  苏夜:
    - 三个进化形态都要有反派气质
    - 青玉蚕：肥嘟嘟但眼神欠揍、痞气、腹黑（不是可爱！）
    - 碧鳞蛇：优雅但危险、狡猾、嘴炮
    - 玄冥蟒：霸气、威严、强大、护短
  叶红衣:
    - 高冷御姐脸
    - 红衣似火、古装武侠
    - 眼神透着倔强和落寞
    - 写实人物比例
