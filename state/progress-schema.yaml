# 状态文件 Schema 定义
# 所有状态文件使用 JSON 格式

version: "1.0"

# 主索引文件：state/progress.json
# 仅作为索引，不直接写入，由 ~status 汇总读取
progress_index:
  version:
    type: string
    description: "Schema version"
  batch_start:
    type: string
    description: "Batch start timestamp (ISO 8601)"
  episodes:
    type: object
    description: "Episode index, key = episode id"
    properties:
      status:
        type: string
        enum: [pending, in_progress, awaiting_review, completed, failed, skipped]
      current_phase:
        type: number
        description: "Current phase number. Supports integer (1-5) and decimal phases for v2.0 (0, 2.2, 2.3, 2.5, 3.5, 6)"

# 各阶段状态文件：state/{ep}-phase{N}.json
# 每个 agent 完成后写入自己的阶段文件
phase_state:
  episode:
    type: string
    description: "Episode id"
  phase:
    type: number
    description: "Phase number. Supports integer (1-5) and decimal phases for v2.0 (0, 2.2, 2.3, 2.5, 3.5, 6)"
  status:
    type: string
    enum: [in_progress, awaiting_review, needs_revision, completed, failed]
  started_at:
    type: string
    description: "Start timestamp (ISO 8601)"
  completed_at:
    type: string
    description: "Completion timestamp (ISO 8601)"
  data:
    type: object
    description: "Phase-specific data"

# Phase 1 (comply-agent) data
phase1_data:
  rewrites_count:
    type: integer
    description: "Number of rewrites made during compliance check"
  compliance_passed:
    type: boolean
    description: "Whether compliance check passed"

# Phase 2 (visual-agent) data
phase2_data:
  shot_count:
    type: integer
    description: "Total number of shots"
  total_duration:
    type: number
    description: "Total duration in seconds"

# Phase 3 (design-agent) data
phase3_data:
  new_characters:
    type: integer
    description: "Number of newly generated character reference images"
  reused_characters:
    type: integer
    description: "Number of reused character reference images"
  scenes:
    type: integer
    description: "Number of scene reference images"

# Phase 4 (voice-agent) data
phase4_data:
  voice_count:
    type: integer
    description: "Number of voices configured"

# 镜次状态文件：state/{ep}-shot-{N}.json
# 每个 gen-worker 独立写入
shot_state:
  episode:
    type: string
    description: "Episode id"
  shot_id:
    type: string
    description: "Full shot id (e.g., ep01-s01-shot01)"
  shot_index:
    type: integer
    description: "Shot index number (1, 2, 3...)"
  status:
    type: string
    enum: [pending, generating, completed, failed]
    description: "Current shot status"
  started_at:
    type: string
    description: "Start timestamp (ISO 8601)"
  completed_at:
    type: string
    description: "Completion timestamp (ISO 8601)"
  video_path:
    type: string
    description: "Path to generated video file (empty string if failed)"
  original_retries:
    type: integer
    description: "Number of retries with original prompt"
  rewrite_rounds:
    type: integer
    description: "Number of prompt rewrite rounds"
  total_api_calls:
    type: integer
    description: "Total number of API calls made"
  error_message:
    type: string
    description: "Human-readable error message if failed"
  last_prompt:
    type: string
    description: "Last prompt used before failure (for debugging)"
  last_rejection:
    type: string
    description: "Last rejection reason from API (for debugging)"

# ─── A/B 测试扩展 ───

# A/B 镜次状态：state/{ep}-shot-{N}-a.json / state/{ep}-shot-{N}-b.json
# 继承 shot_state 所有字段，额外增加：
ab_shot_state:
  extends: shot_state
  additional_fields:
    variant:
      type: string
      description: "变体标识（如 baseline, cinematic-v1）"
    variant_prompt:
      type: string
      description: "变体变换后实际使用的提示词"

# A/B 评分结果：state/{ep}-shot-{N}-ab-result.json
ab_result_state:
  episode: { type: string }
  shot_id: { type: string }
  shot_index: { type: integer }
  variant_a:
    id: { type: string }
    video_path: { type: string }
    status: { type: string, enum: [completed, failed] }
    prompt_used: { type: string }
  variant_b:
    id: { type: string }
    video_path: { type: string }
    status: { type: string, enum: [completed, failed] }
    prompt_used: { type: string }
  scoring:
    scored: { type: boolean, default: false }
    variant_a_scores: { type: object, description: "各维度评分" }
    variant_b_scores: { type: object, description: "各维度评分" }
    variant_a_weighted: { type: number }
    variant_b_weighted: { type: number }
    winner: { type: string, enum: [a, b, tie] }
    notes: { type: string }

# ─── v2.0 新增 Phase Data ───

# Phase 0 (ontology-builder-agent) data
phase0_data:
  world_model_path:
    type: string
    description: "Path to generated world-model.json"
  entity_count:
    type: integer
    description: "Number of entities extracted (characters + scenes + props)"
  relation_count:
    type: integer
    description: "Number of relations extracted"

# Phase 2.2 (narrative-review-agent) data
phase2_2_data:
  decision:
    type: string
    enum: [auto_pass, fixed_pass, reject]
    description: "Review decision"
  total_score:
    type: number
    description: "Weighted total score (0-100)"
  issues_count:
    type: integer
    description: "Number of issues found"

# Phase 2.3 (storyboard-agent) data
phase2_3_data:
  storyboard_count:
    type: integer
    description: "Number of storyboard images generated"
  preview_path:
    type: string
    description: "Path to storyboard-preview.md"

# Phase 2.5 (asset-factory-agent) data
phase2_5_data:
  characters_generated:
    type: integer
    description: "Number of character asset packs generated"
  scenes_generated:
    type: integer
    description: "Number of scene styleframes generated"
  props_generated:
    type: integer
    description: "Number of prop asset packs generated"

# Phase 3.5 (shot-compiler-agent) data
phase3_5_data:
  shot_packets_generated:
    type: integer
    description: "Number of shot packets compiled"

# Phase 6 (qa-agent + repair-agent) data
phase6_data:
  shots_audited:
    type: integer
    description: "Number of shots audited by qa-agent"
  shots_repaired:
    type: integer
    description: "Number of shots successfully repaired"
  shots_failed:
    type: integer
    description: "Number of shots that failed after max repair attempts"