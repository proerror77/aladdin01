name: "凌霄"
project: "jiuba"
tier: "protagonist"
age: 23
gender: "male"
appearance: |
  黑色潮流穿搭，狼尾鲻鱼头，手腕挂古朴铜钱手链，腰侧挂铜钱鞭，手持桃木剑；
  执行任务时穿廉价亮黄大八卦印道袍，戴墨镜；掌心可涌动金光，会御剑飞行
personality: |
  表面玩世不恭、嘴毒心软，爱耍帅爱怼人，精明算计、抠门（被称"凌老抠"）；
  实则心怀大义、沉稳睿智，临危不乱，领导力强，重情义；
  对道家文化极度敬畏，对异国邪术零容忍，驱邪时狠辣决绝；
  喜欢创新道法（"科学修仙"/"传统道法的现代化改造"）
