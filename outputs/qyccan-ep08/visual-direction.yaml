# 视觉指导说明

## 角色变体使用
- 苏夜全集使用 variant_id: "xuanming_python"（玄冥黑金蟒形态）
- shot-01~06 为缩小版（盘在叶红衣脖子上像黑项圈）
- shot-07~12 恢复正常体型
- 叶红衣全集使用 variant_id: "default"

## 场景时间
- 8-1（shot-01~06）: time_of_day: "day"（叶家大厅）
- 8-2（shot-07~12）: time_of_day: "night"（叶红衣闺房）

## 时长分配
- 总时长：168 秒
- 平均每镜：14 秒
