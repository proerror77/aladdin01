# 视觉指导说明

## 角色变体使用
- 苏夜全集使用 variant_id: "snake_green"（碧鳞蛇，ep03进化后）
- 叶红衣全集使用 variant_id: "default"
- 叶如烟 shot-11、12 登场，使用 variant_id: "default"

## 场景时间
- 全集在叶红衣闺房 time_of_day: "night"（夜晚）

## 合规注意
- 本集已大幅改写原始剧本性暗示内容，视觉指导不含任何裸露/色情元素
- 苏夜解毒场景为特效画面，以黑气流动表达，无身体接触特写
