# 视觉指导说明

## 角色变体使用
- 苏夜在 shot-01 到 shot-09 使用 variant_id: "default"（青玉蚕形态）
- 苏夜在 shot-10 到 shot-12 使用 variant_id: "snake_green"（碧鳞蛇形态）
- 叶红衣全集使用 variant_id: "default"（红衣破损状态）

## 场景时间
- 全部镜次使用 time_of_day: "day"（白天）

## Seedance 提示词格式
- 遵循 5-block 结构：主体 + 动作 + 场景 + 镜头 + 风格
- 最大长度：2000 字符
- 对白格式：角色名: "台词内容"（唇形同步）
- 参考图引用：@{角色名}

## 时长分配
- 总时长：180 秒（3 分钟）
- 平均每镜：15 秒
- 关键镜次（进化、战斗）：15 秒
- 对话镜次：12 秒
- 动作镜次：10-15 秒
